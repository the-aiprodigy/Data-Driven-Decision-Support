<!doctype html><html><head><meta charset='utf-8'><title>Root Cause</title><link rel='stylesheet' href='style.css'></head><body><nav><a href='index.html'>Overview</a><a href='segments.html'>Segments</a><a href='rootcause.html'>Root Cause</a><a href='recommendations.html'>Recommendations</a></nav><div class='wrap'><div class='card'><h2>Bias Analysis</h2><canvas id='bias'></canvas><p id='txt'></p></div></div><script src='app.js'></script><script>load().then(d=>{const labels=['Switched distance','Not-sw distance','Switched duration','Not-sw duration'];const vals=[d.bias.switched.distance,d.bias.not_switched.distance,d.bias.switched.duration,d.bias.not_switched.duration].map(v=>Math.max(v,0));bar('bias',labels,vals);document.getElementById('txt').textContent=`Switched rides show higher underprediction bias (distance ${(d.bias.switched.distance*100).toFixed(1)}%, duration ${(d.bias.switched.duration*100).toFixed(1)}%).`;});</script></body></html>
